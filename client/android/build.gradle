// Top-level build file where you can add configuration options common to all sub-projects/modules.
import java.util.Properties

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

def ensureAndroidSdkPath() {
  def localPropertiesFile = new File(rootDir, "local.properties")
  def localProperties = new Properties()

  if (localPropertiesFile.exists()) {
    localPropertiesFile.withInputStream { input ->
      localProperties.load(input)
    }
  }

  if (localProperties.getProperty("sdk.dir")) {
    return
  }

  def inferredSdkDir =
    System.getenv("ANDROID_HOME") ?:
    System.getenv("ANDROID_SDK_ROOT")

  if (!inferredSdkDir) {
    def defaultMacSdkDir = new File(System.getProperty("user.home"), "Library/Android/sdk")
    if (defaultMacSdkDir.exists()) {
      inferredSdkDir = defaultMacSdkDir.absolutePath
    }
  }

  if (!inferredSdkDir) {
    return
  }

  localProperties.setProperty("sdk.dir", inferredSdkDir)
  localPropertiesFile.withOutputStream { output ->
    localProperties.store(output, null)
  }
}

ensureAndroidSdkPath()

def reactNativeAndroidDir = new File(
  providers.exec {
    workingDir(rootDir)
    commandLine("node", "--print", "require.resolve('react-native/package.json')")
  }.standardOutput.asText.get().trim(),
  "../android"
)

allprojects {
  repositories {
    maven {
      // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
      url(reactNativeAndroidDir)
    }

    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
